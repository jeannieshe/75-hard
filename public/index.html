<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>75 Hard Tracker</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <!-- Auth screen -->
  <div id="authScreen">
    <h1>75 Hard</h1>
    <p>Sign in to track your progress across all your devices.</p>
    <button class="google-btn" id="googleSignIn">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Sign in with Google
    </button>
  </div>

  <!-- Main app -->
  <div id="app">
    <header>
      <button class="signout-btn" id="signOutBtn">Sign out</button>
      <h1>75 Hard</h1>
      <div class="date" id="dateDisplay"></div>
      <div class="day-badge">
        Day <span id="dayNumber">1</span> of 78
        <span class="slack-label">(2 slack days)</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar"></div>
      </div>
    </header>

    <nav class="day-nav">
      <button id="prevDay">← Prev</button>
      <button id="todayBtn" class="today-btn">Today</button>
      <button id="nextDay">Next →</button>
    </nav>

    <main class="sections">
      <div class="section implement">
        <h2>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          Habits to Build
        </h2>
        <div class="habit-list" id="implementList"><div class="loading">Loading…</div></div>
        <div class="add-habit">
          <input type="text" id="implementInput" placeholder="Add a habit…" />
          <button id="addImplementBtn">+</button>
        </div>
      </div>

      <div class="section avoid">
        <h2>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Habits to Avoid
        </h2>
        <div class="habit-list" id="avoidList"><div class="loading">Loading…</div></div>
        <div class="add-habit">
          <input type="text" id="avoidInput" placeholder="Add something to avoid…" />
          <button id="addAvoidBtn">+</button>
        </div>
      </div>
    </main>

    <section class="skin-section">
      <div class="section skin">
        <h2>
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12" y2="16"/></svg>
          Skin Log
        </h2>
        <div class="skin-severity">
          <div class="field-label">Severity</div>
          <div class="severity-btns" id="severityBtns">
            <button class="sev-btn" data-sev="1">1</button>
            <button class="sev-btn" data-sev="2">2</button>
            <button class="sev-btn" data-sev="3">3</button>
            <button class="sev-btn" data-sev="4">4</button>
            <button class="sev-btn" data-sev="5">5</button>
          </div>
        </div>
        <div class="skin-notes">
          <div class="field-label">Notes</div>
          <textarea id="skinNotes" placeholder="How's your skin today?" rows="3"></textarea>
        </div>
      </div>
    </section>

    <footer>
      <button class="export-btn" id="exportBtn">Export CSV</button>
    </footer>
  </div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
